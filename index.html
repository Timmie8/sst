<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Trading Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

.buy { border-left: 5px solid #22c55e; }
.sell { border-left: 5px solid #ef4444; }

.signal {
  font-weight: bold;
}

iframe {
  width: 100%;
  height: 350px;
  border: none;
  margin-top: 10px;
}

.status {
  text-align: center;
  margin: 10px;
  color: #94a3b8;
}
</style>
</head>

<body>

<header>📈 Trading Dashboard</header>

<div class="container">

<input type="text" id="filter" placeholder="🔎 Filter op ticker..." onkeyup="filterData()">

<button onclick="loadFeed()">🔄 Refresh</button>

<div class="status" id="status">Laden...</div>

<div id="feed"></div>

</div>

<script>

let allData = [];

// 🔥 DEMO DATA (altijd zichtbaar)
const demoData = [
  { title: "AAPL BUY breakout", link:"#", pubDate:new Date() },
  { title: "TSLA SELL resistance hit", link:"#", pubDate:new Date() },
  { title: "NVDA BUY momentum", link:"#", pubDate:new Date() }
];

function getSignal(title) {
  title = title.toLowerCase();
  if (title.includes("buy")) return "BUY";
  if (title.includes("sell")) return "SELL";
  return "NEUTRAL";
}

function renderData(data) {
  const container = document.getElementById("feed");
  container.innerHTML = "";

  data.forEach(item => {

    const signal = getSignal(item.title);
    const ticker = item.title.split(" ")[0];

    const card = document.createElement("div");
    card.className = "card " + (signal === "BUY" ? "buy" : signal === "SELL" ? "sell" : "");

    card.innerHTML = `
      <div><b>${ticker}</b> - ${item.title}</div>
      <div class="signal">📊 Signaal: ${signal}</div>
      <div>${new Date(item.pubDate).toLocaleString()}</div>

      <iframe src="https://s.tradingview.com/widgetembed/?symbol=${ticker}&interval=60"></iframe>

      <a href="${item.link}" target="_blank">Lees meer →</a>
    `;

    container.appendChild(card);
  });
}

async function loadFeed() {
  const status = document.getElementById("status");

  // Eerst demo tonen
  renderData(demoData);
  status.innerText = "Demo data geladen (wacht op live data...)";

  try {
    const url = "https://api.rss2json.com/v1/api.json?rss_url=YOUR_RSS_URL";

    const res = await fetch(url);
    const data = await res.json();

    if (!data.items || data.items.length === 0) {
      status.innerText = "⚠️ Geen live data gevonden - controleer RSS";
      return;
    }

    allData = data.items;
    renderData(allData);
    status.innerText = "✅ Live data geladen";

  } catch (e) {
    status.innerText = "❌ Fout bij laden - demo actief";
  }
}

function filterData() {
  const value = document.getElementById("filter").value.toLowerCase();

  const filtered = allData.length
    ? allData.filter(item => item.title.toLowerCase().includes(value))
    : demoData.filter(item => item.title.toLowerCase().includes(value));

  renderData(filtered);
}

loadFeed();

// Auto refresh
setInterval(loadFeed, 300000);

</script>

</body>
</html>
