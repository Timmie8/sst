<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Live Trading Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 24px;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 10px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #38bdf8;
  cursor: pointer;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

.buy { border-left: 5px solid #22c55e; }
.sell { border-left: 5px solid #ef4444; }

iframe {
  width: 100%;
  height: 350px;
  border: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<header>📈 Live Trading Dashboard (Yahoo)</header>

<div class="container">

<input type="text" id="tickerInput" placeholder="Bijv: AAPL, TSLA, NVDA">
<button onclick="loadStock()">📊 Laad aandeel</button>

<div id="result"></div>

</div>

<script>

async function loadStock() {
  const ticker = document.getElementById("tickerInput").value.toUpperCase();
  const container = document.getElementById("result");

  if (!ticker) return;

  container.innerHTML = "Laden...";

  try {
    const res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${ticker}`);
    const data = await res.json();

    const stock = data.quoteResponse.result[0];

    if (!stock) {
      container.innerHTML = "❌ Ticker niet gevonden";
      return;
    }

    const price = stock.regularMarketPrice;
    const change = stock.regularMarketChange;

    let signal = "NEUTRAL";
    let className = "";

    if (change > 0) {
      signal = "BUY";
      className = "buy";
    } else if (change < 0) {
      signal = "SELL";
      className = "sell";
    }

    container.innerHTML = `
      <div class="card ${className}">
        <h2>${stock.symbol}</h2>
        <p>💰 Prijs: $${price}</p>
        <p>📊 Verandering: ${change.toFixed(2)}</p>
        <p><b>Signaal: ${signal}</b></p>

        <iframe src="https://s.tradingview.com/widgetembed/?symbol=${ticker}&interval=60"></iframe>
      </div>
    `;

  } catch (e) {
    container.innerHTML = "❌ Fout bij laden data";
  }
}

</script>

</body>
</html>
