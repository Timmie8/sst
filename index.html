<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Pro Trading Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 26px;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 10px;
}

.box {
  background: #1e293b;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

</style>
</head>

<body>

<header>📈 Pro Trading Dashboard</header>

<div class="container">

<!-- 🔎 SYMBOL SEARCH -->
<div class="box">
  <h3>🔎 Zoek aandeel</h3>

  <div class="tradingview-widget-container">
    <div id="tv-search"></div>
    <script src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-search.js">
    {
      "width": "100%",
      "height": "400",
      "locale": "nl",
      "colorTheme": "dark"
    }
    </script>
  </div>
</div>

<!-- 📊 MARKET OVERVIEW -->
<div class="box">
  <h3>🌍 Markt overzicht</h3>

  <div class="tradingview-widget-container">
    <div id="tv-market"></div>
    <script src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js">
    {
      "colorTheme": "dark",
      "dateRange": "1D",
      "showChart": true,
      "locale": "nl",
      "width": "100%",
      "height": "400",
      "tabs": [
        {
          "title": "Aandelen",
          "symbols": [
            {"s":"NASDAQ:AAPL"},
            {"s":"NASDAQ:TSLA"},
            {"s":"NASDAQ:NVDA"},
            {"s":"NASDAQ:MSFT"}
          ]
        },
        {
          "title": "Crypto",
          "symbols": [
            {"s":"BINANCE:BTCUSDT"},
            {"s":"BINANCE:ETHUSDT"}
          ]
        }
      ]
    }
    </script>
  </div>
</div>

<!-- 📈 LIVE CHART -->
<div class="box">
  <h3>📈 Live Chart</h3>

  <div class="tradingview-widget-container">
    <div id="tv-chart"></div>
    <script src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js">
    {
      "symbol": "NASDAQ:AAPL",
      "interval": "60",
      "timezone": "Europe/Amsterdam",
      "theme": "dark",
      "style": "1",
      "locale": "nl",
      "width": "100%",
      "height": "500"
    }
    </script>
  </div>
</div>

</div>

</body>
</html>
